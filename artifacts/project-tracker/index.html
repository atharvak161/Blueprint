    <script>
      // GitHub Pages SPA redirect: if we arrived via 404.html redirect, restore the URL
      (function() {
        var r = sessionStorage.getItem('gh_redirect');
        if (r) { sessionStorage.removeItem('gh_redirect'); history.replaceState(null, null, r); }
      })();
    </script>
